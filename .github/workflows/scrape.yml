name: Monthly Price Scrape

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of every month at 10:00 SAST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit updated prices
        run: |
          git config user.name  "Price Tracker Bot"
          git config user.email "action@github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "No new data."
          else
            git commit -m "chore: price update $(date +'%Y-%m')"
            git push
          fi
